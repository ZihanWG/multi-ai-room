name: Bug report
description: Report a reproducible problem.
title: "[Bug]: "
labels:
  - bug
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What went wrong?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Include the exact commands or UI actions.
      placeholder: |
        1. Run `streamlit run app.py`
        2. Enter ...
        3. Click ...
    validations:
      required: true
  - type: input
    id: python-version
    attributes:
      label: Python version
      placeholder: "3.12.10"
    validations:
      required: true
  - type: dropdown
    id: providers
    attributes:
      label: Configured providers
      multiple: true
      options:
        - OpenAI
        - Anthropic
        - Gemini
        - None
  - type: textarea
    id: logs
    attributes:
      label: Logs or screenshots
      description: Remove API keys, tokens, personal data, and private prompts before posting.
      render: text
