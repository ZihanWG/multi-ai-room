name: Feature request
description: Suggest an improvement or new capability.
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What user need or workflow gap does this solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the behavior, UI, or API change you want.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Optional, but helpful for product and implementation tradeoffs.
  - type: checkboxes
    id: impact
    attributes:
      label: Impact
      options:
        - label: This may require new environment variables.
        - label: This may call external model APIs or increase API cost.
        - label: This changes user-facing UI.
